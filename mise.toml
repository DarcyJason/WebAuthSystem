experimental_monorepo_root = true

[env]
MISE_EXPERIMENTAL = true

[monorepo]
config_roots = [
    "backend",
    "frontend",
    "docker",
]

[tools]
rust = "1.94.0"
node = "24.14.0"
pnpm = "10.32.1"

[tasks.backend]
depends = [
    "//docker:surrealdb-start",
    "//docker:redis-start",
    "//docker:jaeger-start",
    "//docker:kafka-start"
]
run = "mise run //backend:dev"
depends_post = [
    "//docker:surrealdb-stop",
    "//docker:redis-stop",
    "//docker:jaeger-stop",
    "//docker:kafka-stop"
]

[tasks."backend:fix"]
run = [
    "mise run //docker:surrealdb-stop",
    "mise run //docker:redis-stop",
    "mise run //docker:jaeger-stop",
    "mise run //docker:kafka-stop"
]

[tasks.frontend]
depends = "//frontend:prepare"
run = "mise run //frontend:dev"
