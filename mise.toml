experimental_monorepo_root = true

[env]
MISE_EXPERIMENTAL = true

[monorepo]
config_roots = [
    "backend",
    "frontend",
    "docker",
]

[tools]
rust = "1.94.0"
node = "24.14.0"
pnpm = "10.32.1"

[tasks.backend]
depends = [
    "//docker:surrealdb-start",
    "//docker:redis-start",
]
run = "mise run //backend:dev"
depends_post = [
    "//docker:surrealdb-stop",
    "//docker:redis-stop",
]
