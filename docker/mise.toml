[tasks."surrealdb-start"]
run = '''
# surrealdb-start
docker run \
    --name surrealdb \
    -p 10086:8000 \
    -v ./surrealdb:/data \
    -d surrealdb/surrealdb:v2.4.0 \
    start \
    --user root \
    --pass root \
    rocksdb:/data/mydatabase.db
'''

[tasks."surrealdb-stop"]
run = '''
# surrealdb-stop
docker stop surrealdb
docker rm surrealdb
'''

[tasks."redis-start"]
run = '''
# redis-start
docker run \
    --name redis \
	-p 6379:6379 \
	-v ./redis:/data \
	-d redis:8.4.0
'''

[tasks."redis-stop"]
run = '''
# redis-stop
docker stop redis
docker rm redis
'''

[tasks."jaeger-start"]
run = '''
# jaeger-start
docker run \
    --name jaeger \
    -p 16686:16686 \
    -p 4317:4317 \
    -p 4318:4318 \
    -d jaegertracing/all-in-one:1.76.0\
'''

[tasks."jaeger-stop"]
run = '''
# jaeger-stop
docker stop jaeger
docker rm jaeger
'''

[tasks."kafka-start"]
run = '''
# kafka-start
docker run \
    --name kafka \
    -p 9092:9092 \
    -d apache/kafka:4.2.0
'''

[tasks."kafka-stop"]
run = '''
# kafka-stop
docker stop kafka
docker rm kafka
'''
