services:
  postgres:
    container_name: my-postgres
    image: m.daocloud.io/docker.io/library/postgres:18
    environment:
      POSTGRES_USER: notnone
      POSTGRES_PASSWORD: O6RYvE1KBO3E%MyB2I0mrHJ3
      POSTGRES_DB: web_auth_system
    ports:
      - "0.0.0.0:5432:5432"
    networks:
      - web-auth-system-dev-network
    volumes:
      - ./postgres/data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=O6RYvE1KBO3E%MyB2I0mrHJ3 pg_isready -U notnone -h postgres" ]
      interval: 10s
      timeout: 30s
      retries: 15
  redis:
    container_name: my-redis
    image: m.daocloud.io/docker.io/library/redis:8.4.0
    ports:
      - "0.0.0.0:6379:6379"
    networks:
      - web-auth-system-dev-network
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli", "ping" ]
      interval: 10s
      timeout: 30s
      retries: 15

networks:
  web-auth-system-dev-network:
