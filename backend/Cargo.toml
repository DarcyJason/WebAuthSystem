[package]
name = "backend"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = { version = "1.0.100", features = ["std"] }
argon2 = "0.5.3"
axum = "0.8.8"
axum-extra = { version = "0.12.5", features = ["cookie"] }
axum-test = "18.6.0"
chrono = { version = "0.4.42", features = ["serde"] }
colorgrad = "0.8.0"
dotenvy = "0.15.7"
figment2 = { version = "0.11.4", features = ["env"] }
jsonwebtoken = { version = "10.2.0", features = ["aws_lc_rs"] }
owo-colors = "4.2.3"
redis = "1.0.2"
reqwest = "0.13.1"
resend-rs = "0.19.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
surrealdb = { version = "2.4.1", features = ["protocol-http"] }
thiserror = { version = "2.0.17", features = ["std"] }
tokio = { version = "1.49.0", features = ["full"] }
tower-http = { version = "0.6.8", features = ["trace", "cors"] }
tracing = "0.1.44"
tracing-appender = "0.2.4"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "fmt", "time", "json"] }
uuid = { version = "1.19.0", features = ["v4"] }
validator = { version = "0.20.0", features = ["derive"] }
